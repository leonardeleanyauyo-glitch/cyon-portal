<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYON Sign Up</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
body, html {
  margin:0; 
  padding:0; 
  height:100%;
  font-family: Arial, sans-serif;
  background: url('logo.png') no-repeat center center fixed;
  background-size: cover;
  display: flex; 
  justify-content:center; 
  align-items:center;
}
.overlay { 
  background: rgba(0,0,0,0.6); 
  width:100%; 
  height:100%; 
  position:absolute; 
  top:0; 
  left:0; 
}
.signup-container {
  position: relative; 
  z-index:2; 
  background:white; 
  padding:40px; 
  border-radius:12px; 
  width:90%; 
  max-width:400px; 
  text-align:center;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}
.signup-container h2 { margin-bottom:30px; color:#222; }
.signup-container input { 
  width:100%; 
  padding:12px 15px; 
  margin:10px 0; 
  border-radius:6px; 
  border:1px solid #ccc; 
  font-size:16px; 
}
.signup-container button { 
  width:100%; 
  padding:12px; 
  margin-top:15px; 
  border:none; 
  border-radius:6px; 
  background:#FFD700; 
  font-weight:bold; 
  cursor:pointer; 
  transition:0.3s; 
}
.signup-container button:hover { background:#FFC107; }
.login-link, .forgot-link { 
  display:block; 
  margin-top:15px; 
  font-size:14px; 
  text-decoration:none; 
  color:#555; 
}
.login-link:hover, .forgot-link:hover { text-decoration:underline; }
.error-msg { color:red; font-size:14px; margin-top:10px; }
.success-msg { color:green; font-size:14px; margin-top:10px; }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="signup-container">
  <h2>CYON Sign Up</h2>
  <form id="signup-form">
    <input type="email" placeholder="Email" id="email" required>
    <input type="password" placeholder="Password" id="password" required>
    <button type="submit">Create Account</button>
    <p class="error-msg" id="error-msg"></p>
    <p class="success-msg" id="success-msg"></p>
  </form>
  <a class="login-link" href="login.html">Already have an account? Login</a>
  <a class="forgot-link" href="#" id="forgot-password">Forgot Password?</a>
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCKqov2pX2h5dAvNUorntbbHg9ncZiqTj0",
  authDomain: "cyon-portal.firebaseapp.com",
  projectId: "cyon-portal",
  storageBucket: "cyon-portal.firebasestorage.app",
  messagingSenderId: "1014389012339",
  appId: "1:1014389012339:web:003af7f9776e33d1667706"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// Handle sign-up
document.getElementById('signup-form').addEventListener('submit', e => {
  e.preventDefault();
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('error-msg');
  const successMsg = document.getElementById('success-msg');
  errorMsg.innerText = "";
  successMsg.innerText = "";

  auth.createUserWithEmailAndPassword(email, password)
    .then(userCredential => {
      const user = userCredential.user;
      user.sendEmailVerification({
        url: window.location.origin + '/email-verified.html' // Redirect after verification
      }).then(() => {
        successMsg.innerText = "Verification email sent! Check your inbox. After verifying, click the link to login.";
      }).catch(err => errorMsg.innerText = err.message);
    })
    .catch(err => errorMsg.innerText = err.message);
});

// Password reset
document.getElementById('forgot-password').addEventListener('click', () => {
  const email = prompt("Enter your email for password reset:");
  if(email){
    auth.sendPasswordResetEmail(email)
      .then(() => alert("Password reset email sent!"))
      .catch(err => alert(err.message));
  }
});
</script>

</body>
</html>
