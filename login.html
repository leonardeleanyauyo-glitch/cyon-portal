<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CYON Login</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body, html {
  margin:0;
  padding:0;
  height:100%;
  font-family: Arial, sans-serif;
  background: url('logo.png') no-repeat center center fixed;
  background-size: cover;
  display:flex;
  justify-content:center;
  align-items:center;
}
.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
}
.container {
  position:relative;
  z-index:2;
  background:white;
  padding:40px;
  border-radius:12px;
  text-align:center;
  width:90%;
  max-width:400px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}
input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
button {
  width:100%;
  padding:12px;
  background:#FFD700;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}
button:hover {
  background:#FFC107;
}
.msg {
  margin-top:10px;
  font-size:14px;
  color:red;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
  <h2>Login</h2>

  <form id="login-form">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>

  <p class="msg" id="error"></p>

  <a href="create-account.html">Create Account</a>
</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyCKqov2pX2h5dAvNUorntbbHg9ncZiqTj0",
  authDomain: "cyon-portal.firebaseapp.com",
  projectId: "cyon-portal",
  storageBucket: "cyon-portal.firebasestorage.app",
  messagingSenderId: "1014389012339",
  appId: "1:1014389012339:web:003af7f9776e33d1667706"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// LOGIN
document.getElementById("login-form").addEventListener("submit", async function(e){
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const error = document.getElementById("error");

  error.innerText = "";

  try {
    const userCredential = await auth.signInWithEmailAndPassword(email, password);
    const user = userCredential.user;

    // ✅ Check email verification
    if (!user.emailVerified) {
      error.innerText = "Please verify your email first.";
      return;
    }

    // ✅ Admin bypass
    if (user.email === "leonardeleanyauyo@gmail.com") {
      window.location.href = "dashboard.html";
      return;
    }

    // ✅ Check payment status
    const doc = await db.collection("users").doc(user.uid).get();

    if (doc.exists && doc.data().paid === true) {
      // Already paid
      window.location.href = "dashboard.html";
    } else {
      // Not paid
      window.location.href = "paystack.html";
    }

  } catch (err) {
    error.innerText = err.message;
  }
});
</script>

</body>
</html>
